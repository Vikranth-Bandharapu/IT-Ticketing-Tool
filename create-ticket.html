<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Ticket | Apex Command Center</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <div class="sports-background" style="background: var(--bg-darker);"></div>
  <div class="dynamic-lines"></div>

  <!-- Dashboard Top Navbar -->
  <header class="sticky" style="padding: 1rem 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <a href="employee-dashboard.html" class="btn btn-outline" style="padding: 0.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border: none;" title="Back to Dashboard"><i class="fa-solid fa-arrow-left"></i></a>
        <a href="index.html" class="logo"><i class="fa-solid fa-mountain-sun"></i> Apex Portal</a>
      </div>
      
      <div style="display: flex; align-items: center; gap: 1rem;">
        <span class="user-email-display" style="color: var(--secondary-accent); font-weight: 700;">user@apexit.com</span>
        <a href="#" class="btn btn-outline logout-btn" style="padding: 0.5rem 1rem;">Logout</a>
      </div>
    </div>
  </header>

  <div class="dashboard-container" style="justify-content: center;">
    
    <main class="main-content" style="margin-left: 0; max-width: 800px; width: 100%;">
      <div class="glass-card" style="margin-top: 2rem; border-top: 4px solid var(--primary-action);">
        <h2 style="margin-bottom: 2rem; color: #fff;"><i class="fa-solid fa-bolt" style="color: var(--primary-action); margin-right: 10px;"></i> Create New Ticket</h2>
        
        <form id="createTicketForm">
          <div class="form-group">
            <label>Ticket Title *</label>
            <input type="text" id="ticketTitle" class="form-control" placeholder="Brief summary of the issue" required>
            <span class="error-msg"></span>
          </div>

          <div class="grid-2-col">
            <div class="form-group">
              <label>Category *</label>
              <select id="category" class="form-control" required>
                <option value="">Select Category</option>
                <option value="Hardware">Hardware</option>
                <option value="Software">Software</option>
                <option value="Network">Network</option>
                <option value="Access">Access & Permissions</option>
                <option value="Other">Other</option>
              </select>
              <span class="error-msg"></span>
            </div>
            
            <div class="form-group">
              <label>Priority *</label>
              <select id="priority" class="form-control" required>
                <option value="">Select Priority</option>
                <option value="Low">Low (Can wait a few days)</option>
                <option value="Medium">Medium (Impacting work somewhat)</option>
                <option value="High">High (Cannot work)</option>
                <option value="Critical">Critical (System down)</option>
              </select>
              <span class="error-msg"></span>
            </div>
          </div>

          <div class="form-group">
            <label>Department *</label>
            <select id="department" class="form-control" required>
              <option value="">Select Department</option>
              <option value="HR">Human Resources</option>
              <option value="Finance">Finance</option>
              <option value="Engineering">Engineering</option>
              <option value="Marketing">Marketing</option>
            </select>
            <span class="error-msg"></span>
          </div>

          <div class="form-group">
            <label>Description *</label>
            <textarea id="description" class="form-control" rows="6" placeholder="Provide detailed information about your request or issue..." required></textarea>
            <span class="error-msg"></span>
          </div>

          <div class="form-group">
            <label>Attachment Upload</label>
            <input type="file" id="attachment" class="form-control" style="padding: 0.7rem;">
            <small style="color: var(--text-muted); display: block; margin-top: 0.5rem; font-weight: normal;">Upload screenshots or logs (Max size 5MB)</small>
          </div>

          <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Submit Ticket</button>
            <a href="employee-dashboard.html" class="btn btn-outline" style="padding: 1rem 2rem;">Cancel</a>
          </div>
        </form>
      </div>
    </main>

  </div>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
